<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set a new password — Tabib Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/scifi.css">
</head>
<body class="scifi">
<script>/* Apply the saved display mode BEFORE first paint so minimalist users never
see a dark flash. header.js (or the app's own module) handles live switching. */
try{if(localStorage.getItem('tt_display_mode')==='minimal'){document.documentElement.classList.add('tt-minimal');document.body.classList.remove('scifi','tt-scifi');}}catch(e){}</script>
<div class="nebula"></div>
<canvas id="scifi-field"></canvas>

<header class="site-header" id="site-header"></header>
<div class="wrap narrow">
  <h1 class="page-title reveal" id="page-title">Set a new password</h1>
  <p class="page-sub reveal d1" id="page-sub">Choose a new password for your account.</p>
  <div id="alert-box"></div>
  <div class="card reveal d2" id="form-card" style="display:none">
    <form id="reset-form">
      <div class="field"><label for="np">New password</label><input type="password" id="np" required minlength="6"><div class="hint">At least 6 characters.</div></div>
      <div class="field"><label for="np2">Confirm new password</label><input type="password" id="np2" required minlength="6"></div>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
    </form>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/js/header.js"></script>
<script src="/js/scifi.js"></script>
<script src="/js/firebase-auth.js"></script>
<script>
/* Handles the links Firebase emails out.
   Firebase's own hosted page handles these by default; this page only comes
   into play if the action URL is pointed at this domain (Firebase Console ->
   Authentication -> Templates -> customise action URL), which keeps users on
   the Tabib Talk domain. It supports both link types Firebase sends:
     mode=resetPassword -> set a new password
     mode=verifyEmail   -> confirm the address
*/
function showAlert(msg, type='error'){ document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`; }

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode');
const oobCode = params.get('oobCode');

renderHeader('account');
enableCopyProtection();
enableBlurOnBlur();

(async function init(){
  if (!oobCode) {
    showAlert('This link is missing its security code. Please use the full link from your email, or request a new one from the log-in page.');
    return;
  }

  let auth;
  try { auth = await TTAuth.ready(); }
  catch (err) { showAlert('Sign-in is not configured on this server yet.'); return; }

  if (mode === 'verifyEmail') {
    document.getElementById('page-title').textContent = 'Verify your email';
    document.getElementById('page-sub').textContent = 'Confirming your email address…';
    try {
      await auth.applyActionCode(oobCode);
      showAlert('Your email is verified. Redirecting you to log in…', 'success');
      setTimeout(()=>{ window.location.href='/login.html'; }, 2200);
    } catch (err) {
      showAlert('This verification link is invalid or has already been used. Please request a new one from the log-in page.');
    }
    return;
  }

  if (mode && mode !== 'resetPassword') {
    showAlert('This link isn\'t something we recognise. Please request a new one from the log-in page.');
    return;
  }

  // resetPassword: check the code is still good before showing the form.
  try {
    const email = await auth.verifyPasswordResetCode(oobCode);
    document.getElementById('page-sub').textContent = `Choose a new password for ${email}.`;
    document.getElementById('form-card').style.display = '';
  } catch (err) {
    showAlert('This reset link is invalid or has expired. Please request a new one from the log-in page.');
  }
})();

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const p1 = document.getElementById('np').value, p2 = document.getElementById('np2').value;
  if (p1 !== p2) { showAlert('The two passwords don\'t match.'); return; }
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  try {
    const auth = await TTAuth.ready();
    await auth.confirmPasswordReset(oobCode, p1);
    showAlert('Password updated. Redirecting to log in…', 'success');
    document.getElementById('form-card').style.display='none';
    setTimeout(()=>{ window.location.href='/login.html'; }, 2200);
  } catch (err) {
    showAlert(TTAuth.friendlyError(err));
    btn.disabled = false;
  }
});
</script>
</body>
</html>
