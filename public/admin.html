<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub — Tabib Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/scifi.css">
<style>
  /* The admin hub uses body.scifi for its dark background, but its inline
     styles reference var(--text) / var(--text-dim) / var(--border) — tokens
     defined in main.css's light :root as near-black colours. On the dark
     scifi background that made body copy (e.g. broadcast history messages,
     user rows, plan-name cells) dark-on-dark and effectively invisible.
     Redefine the tokens for the scifi surface here so every inline style
     that reads them renders as bright text without needing to touch each
     dynamically-generated cell. */
  body.scifi {
    --text: #ffffff;
    --text-dim: #d5dde8;
    --muted: #93a2b4;
    --border: rgba(255,255,255,.14);
    --border-soft: rgba(255,255,255,.08);
    --surface: rgba(255,255,255,.03);
    --bg-2: rgba(255,255,255,.04);
  }
  /* Force the same on the tabs' hover state and on the input placeholders so
     nothing slips through. */
  body.scifi input, body.scifi textarea, body.scifi select { color: var(--text); }
  body.scifi input::placeholder, body.scifi textarea::placeholder { color: var(--muted); opacity: 1; }

  .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:28px; }
  @media (min-width:720px){ .stat-grid { grid-template-columns:repeat(4,1fr); } }
  .stat-card { padding:18px 20px; }
  .stat-card .n { font-family:var(--font-display); font-size:1.9rem; font-weight:700; color:var(--text); }
  .stat-card .l { color:var(--muted); font-size:.82rem; margin-top:2px; }
  .stat-card.accent .n { background:var(--accent-grad); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px; border-bottom:1px solid var(--border); padding-bottom:0; }
  .tabs button { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font:inherit; font-weight:600;
    padding:11px 14px; cursor:pointer; transition:all .15s var(--ease); }
  .tabs button.on { color:var(--accent); border-bottom-color:var(--accent); }
  .panel { display:none; } .panel.on { display:block; }

  table.data { width:100%; border-collapse:collapse; font-size:.88rem; }
  table.data th { text-align:left; color:var(--muted); font-weight:600; padding:10px 12px; border-bottom:1px solid var(--border); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
  table.data td { padding:12px; border-bottom:1px solid var(--border-soft); color:var(--text-dim); vertical-align:middle; }
  table.data tr:last-child td { border-bottom:none; }
  .table-scroll { overflow-x:auto; }

  .sub-card { display:flex; gap:16px; padding:16px; margin-bottom:12px; }
  .sub-info { flex:1; min-width:0; }
  .method-badge { display:inline-block; font-size:.66rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase; padding:4px 9px; border-radius:999px; }
  .method-badge.paypal { background:rgba(59,130,246,.15); color:#7fb0ff; }
  .method-badge.instapay { background:rgba(52,211,153,.14); color:var(--ok); }
  .method-badge.upi { background:var(--gold-dim); color:var(--gold); }
  .row-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .row-actions .btn { padding:8px 13px; font-size:.83rem; }
  .empty { color:var(--muted); padding:30px; text-align:center; }
  .gate { max-width:400px; }
  h3.sec { font-family:var(--font-display); font-weight:600; margin:0 0 14px; }

  /* ---- Accounts section ---- */
  .cur-switch { display:flex; gap:4px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:999px; padding:4px; }
  .cur-switch button { background:none; border:none; color:var(--muted); font:inherit; font-weight:700; font-size:.78rem;
    padding:7px 14px; border-radius:999px; cursor:pointer; transition:all .2s cubic-bezier(.2,.8,.2,1); }
  .cur-switch button.on { background:linear-gradient(135deg,#22d3ee,#8b5cf6 55%,#e879f9); color:#04070d; box-shadow:0 0 18px rgba(139,92,246,.4); }

  .chart-grid { display:grid; grid-template-columns:1fr; gap:16px; margin-top:16px; }
  @media (min-width:820px){ .chart-grid { grid-template-columns:1fr 1fr; } }

  .bar-row { display:flex; align-items:flex-end; gap:8px; height:170px; }
  .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0; }
  .bar-track { width:100%; height:110px; display:flex; align-items:flex-end;
    background:rgba(255,255,255,.03); border-radius:8px; overflow:hidden; }
  .bar-fill { width:100%; border-radius:8px 8px 0 0;
    background:linear-gradient(180deg,#22d3ee,#8b5cf6);
    box-shadow:0 0 16px rgba(34,211,238,.35);
    animation: barGrow .9s cubic-bezier(.2,.9,.2,1) both; transform-origin:bottom; }
  @keyframes barGrow { from { transform:scaleY(0); opacity:.3; } to { transform:scaleY(1); opacity:1; } }
  .bar-amt { font-size:.68rem; font-weight:700; color:var(--text); white-space:nowrap; }
  .bar-lbl { font-size:.62rem; color:var(--muted); white-space:nowrap; }

  .split-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0;
    border-bottom:1px solid rgba(255,255,255,.06); font-size:.9rem; color:var(--text-dim); }
  .split-row:last-child { border-bottom:none; }
  .split-row b { color:var(--text); }
</style>
</head>
<body class="scifi">
<script>/* Apply the saved display mode BEFORE first paint so minimalist users never
see a dark flash. header.js (or the app's own module) handles live switching. */
try{if(localStorage.getItem('tt_display_mode')!=='gamify'){document.documentElement.classList.add('tt-minimal');document.body.classList.remove('scifi','tt-scifi');}}catch(e){}</script>
<div class="nebula"></div>
<canvas id="scifi-field"></canvas>

<header class="site-header" id="site-header"></header>
<div class="wrap">
  <h1 class="page-title">Admin Hub</h1>
  <p class="page-sub">Everything happening across Tabib Talk — subscriptions, users, requests and violations, in one place.</p>

  <div id="gate" class="card gate">
    <div class="field"><label for="admin-key">Admin key</label><input type="password" id="admin-key" placeholder="Enter your ADMIN_KEY"></div>
    <button class="btn btn-primary" id="unlock-btn">Unlock hub</button>
    <div id="gate-alert"></div>
  </div>

  <div id="hub" style="display:none">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-outline" id="refresh-btn" title="Reload the latest data">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v5h-5"/></svg>
        Refresh
      </button>
    </div>
    <div class="stat-grid" id="stats"></div>
    <div class="tabs" id="tabs">
      <button class="on" data-tab="subs">Subscriptions</button>
      <button data-tab="users">Users</button>
      <button data-tab="resets">Password resets</button>
      <button data-tab="recs">Recommendations</button>
      <button data-tab="devices">Devices &amp; violations</button>
      <button data-tab="notify">Notifications</button>
      <button data-tab="shares">Phrase Shares</button>
      <button data-tab="interests">Interests</button>
      <button data-tab="accounts">Accounts</button>
      <button data-tab="dev">Developer</button>
    </div>
    <div class="panel on" id="panel-subs"></div>
    <div class="panel" id="panel-users"></div>
    <div class="panel" id="panel-resets"></div>
    <div class="panel" id="panel-recs"></div>
    <div class="panel" id="panel-devices"></div>
    <div class="panel" id="panel-notify"></div>
    <div class="panel" id="panel-shares"></div>
    <div class="panel" id="panel-interests"></div>
    <div class="panel" id="panel-accounts"></div>
    <div class="panel" id="panel-dev"></div>
  </div>
</div>

<script src="/js/header.js"></script>
<script src="/js/scifi.js"></script>
<script>
let KEY = '';
function ah(){ return { 'x-admin-key': KEY }; }
async function adminGet(path){ const r = await fetch(path, { headers: ah() }); if(!r.ok) throw new Error('Request failed ('+r.status+')'); return r.json(); }
async function adminPost(path, body){ const r = await fetch(path, { method:'POST', headers: Object.assign({'Content-Type':'application/json'}, ah()), body: JSON.stringify(body||{}) }); if(!r.ok) throw new Error('Request failed ('+r.status+')'); return r.json(); }
function fmt(iso){ if(!iso) return '—'; try { return new Date(iso).toLocaleString(); } catch(e){ return iso; } }
function fmtD(iso){ if(!iso) return '—'; try { return new Date(iso).toLocaleDateString(); } catch(e){ return iso; } }

renderHeader('account');
enableCopyProtection();
  enableBlurOnBlur();

document.getElementById('unlock-btn').addEventListener('click', async () => {
  KEY = document.getElementById('admin-key').value;
  try {
    await adminGet('/api/admin/overview'); // validates the key
    document.getElementById('gate').style.display='none';
    document.getElementById('hub').style.display='block';
    loadAll();
    // Near-realtime analytics: the top stats re-poll every 30s (each poll also
    // downgrades any newly-expired plans server-side), so tier changes and
    // expiries show up without touching Refresh.
    setInterval(() => { loadStats().catch(()=>{}); }, 30000);
  } catch(e){ document.getElementById('gate-alert').innerHTML = '<div class="alert alert-error" style="margin-top:12px">Invalid admin key.</div>'; }
});

document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); document.getElementById('panel-'+b.dataset.tab).classList.add('on');
}));

async function loadAll(){ await Promise.all([loadStats(), loadSubs(), loadUsers(), loadResets(), loadRecs(), loadDevices(), loadNotify(), loadShares(), loadInterests(), loadDev(), loadAccounts()]); }

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  const original = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = 'Refreshing…';
  try { await loadAll(); } finally { btn.disabled = false; btn.innerHTML = original; }
});

async function loadStats(){
  const data = await adminGet('/api/admin/overview');
  const { totals, activeByTier = {}, activeByPlan = {}, planDurationLabels = {}, renewalsDue = [] } = data;
  const PLAN_NAMES = { // pretty labels for the plan-breakdown line
    'student-monthly':'Student · Monthly', 'student-6m':'Student · 6-month', 'student-12m':'Student · 12-month',
    'professional-monthly':'Professional · Monthly', 'professional-6m':'Professional · 6-month', 'professional-yearly':'Professional · Yearly',
    'lifetime':'Lifetime',
    'basic-monthly':'Basic · Monthly', 'advanced-monthly':'Advanced · Monthly',
  };
  const cards = [
    ['Total users', totals.users, true],
    ['Active subscriptions', totals.active, true],
    ['Payments submitted', totals.submitted, true, 'total transaction ids ever received'],
    ['Payments verified', totals.verified, true, 'approved + rejected'],
    ['Pending review', totals.pending, false],
    ['Expired subs', totals.expired, false, 'plan duration elapsed'],
    ['Renewals due', totals.renewalsDue, false, 'expiring in the next 14 days or already lapsed'],
    ['Approved (all-time)', totals.approved, false],
    ['Rejected', totals.rejected, false],
    ['Reset requests', totals.resetRequests, false],
    ['Flagged devices', totals.flaggedDevices, false],
    ['Device appeals', totals.deviceAppeals || 0, false, 'blocked users waiting for review'],
    ['Recommendations', totals.recommendations, false],
  ];
  const active = totals.active;
  const activeBreakdown = active
    ? `<div class="card stat-card" style="grid-column: 1 / -1">
         <div class="l" style="margin-bottom:8px">Active subscriptions by tier</div>
         <div style="display:flex;flex-wrap:wrap;gap:16px 24px;font-size:.95rem">
           <div><b style="color:var(--text)">Student</b> <span style="color:var(--muted)">·</span> ${activeByTier.student||0}</div>
           <div><b style="color:var(--text)">Professional</b> <span style="color:var(--muted)">·</span> ${activeByTier.professional||0}</div>
           <div><b style="color:var(--text)">Lifetime</b> <span style="color:var(--muted)">·</span> ${activeByTier.lifetime||0}</div>
           <div><b style="color:var(--text)">Basic</b> <span style="color:var(--muted)">·</span> ${activeByTier.basic||0}</div>
           <div><b style="color:var(--text)">Advanced</b> <span style="color:var(--muted)">·</span> ${activeByTier.advanced||0}</div>
         </div>
         <div style="border-top:1px solid var(--border-soft);margin-top:12px;padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:.85rem;color:var(--text-dim)">
           ${Object.entries(activeByPlan).sort((a,b)=>b[1]-a[1]).map(([planId,count])=>`
             <div>${esc(PLAN_NAMES[planId]||planId)} <span style="color:var(--muted)">·</span> ${count}</div>
           `).join('') || '<div style="color:var(--muted);grid-column:1/-1">No active subscriptions right now.</div>'}
         </div>
       </div>`
    : '';
  document.getElementById('stats').innerHTML =
    cards.map(([l,n,a,hint])=>`<div class="card stat-card ${a?'accent':''}"><div class="n">${n}</div><div class="l">${l}${hint?`<div style="font-size:.7rem;color:var(--muted);margin-top:2px">${hint}</div>`:''}</div></div>`).join('')
    + activeBreakdown
    + renderRenewalsDue(renewalsDue);
}

function renderRenewalsDue(list){
  if (!list.length) return '';
  const rows = list.slice(0, 30).map(u => {
    const status = u.daysUntilExpiry < 0
      ? `<span style="color:var(--danger);font-weight:700">Expired ${Math.abs(u.daysUntilExpiry)}d ago</span>`
      : u.daysUntilExpiry <= 3
        ? `<span style="color:var(--danger);font-weight:700">In ${u.daysUntilExpiry}d</span>`
        : `<span style="color:var(--gold);font-weight:600">In ${u.daysUntilExpiry}d</span>`;
    return `<tr>
      <td style="color:var(--text)">${esc(u.name||'—')}</td>
      <td>${esc(u.email)}</td>
      <td>${esc(u.phone||'—')}</td>
      <td>${esc(u.planId||'—')}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');
  return `<div class="card" style="margin-top:14px;grid-column:1/-1">
    <h3 class="sec">Renewals due &amp; recently expired <span style="color:var(--muted);font-weight:500">(${list.length} account${list.length===1?'':'s'})</span></h3>
    <p style="color:var(--muted);font-size:.85rem;margin-top:-6px">Everyone whose plan expires in the next 14 days or has already lapsed. Expired accounts are already downgraded to Explorer automatically — this list is for reaching out.</p>
    <div class="table-scroll"><table class="data">
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Plan</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

// Everything below renders user-submitted text (names, notes, transaction ids)
// into this page, so it all goes through here first — otherwise a crafted value
// would run as script in the admin's browser.
function esc(v){
  return String(v == null ? '' : v).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}

function subCard(p, actions){
  return `<div class="card sub-card">
    <div class="sub-info">
      <span class="method-badge ${esc(p.method)}">${esc(p.method)}</span>
      <span class="pill pill-${p.status==='approved'?(p.expired?'suspended':'active'):(p.status==='rejected'?'rejected':'pending')}" style="margin-left:6px">${p.expired?'suspended':esc(p.status)}</span>
      <div style="font-weight:700;color:var(--text);margin-top:8px">${esc(p.planName)}</div>
      <div style="font-size:.84rem">${p.userName?esc(p.userName)+' · ':''}${esc(p.userEmail)}</div>
      <div style="color:var(--muted);font-size:.8rem">Submitted ${fmt(p.submittedAt)}${p.reviewedAt?' · reviewed '+fmt(p.reviewedAt):''}</div>
      ${p.planExpiresAt?`<div style="color:var(--muted);font-size:.8rem">Plan ${p.expired?'expired':'expires'} ${fmtD(p.planExpiresAt)}</div>`:''}
      ${p.transactionId?`<div style="margin-top:8px"><span style="color:var(--muted);font-size:.8rem">Transaction ID</span><div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem;font-weight:700;color:var(--text);word-break:break-all;user-select:all">${esc(p.transactionId)}</div></div>`:'<div style="color:var(--faint);font-size:.8rem;margin-top:8px">No transaction ID</div>'}
      ${p.referenceNote?`<div style="font-size:.82rem;margin-top:4px">Note: ${esc(p.referenceNote)}</div>`:''}
      ${actions||''}
    </div>
  </div>`;
}

async function loadSubs(){
  const d = await adminGet('/api/admin/subscriptions');
  const sec = (title, arr, withReview) => `<h3 class="sec">${title} <span style="color:var(--muted);font-weight:500">(${arr.length})</span></h3>` +
    (arr.length ? arr.map(p=>subCard(p, withReview?`<div class="row-actions">
        <button class="btn btn-primary" onclick="approve('${p.method}','${p.id}')">Approve &amp; activate</button>
        <button class="btn btn-ghost" onclick="reject('${p.method}','${p.id}')">Reject</button>
      </div>`:'')).join('') : '<div class="empty">Nothing here.</div>');
  document.getElementById('panel-subs').innerHTML =
    sec('Pending review', d.pending, true) +
    sec('Active subscriptions', d.active, false) +
    sec('Suspended (plan duration ended)', d.suspended, false) +
    sec('Rejected', d.rejected, false);
}
async function approve(method,id){ await adminPost(`/api/${method}/admin/approve/${id}`); loadAll(); }
async function reject(method,id){ const reason = prompt('Reason for rejection (optional):')||''; await fetch(`/api/${method}/admin/reject/${id}`, {method:'POST', headers:Object.assign({'Content-Type':'application/json'},ah()), body:JSON.stringify({reason})}); loadAll(); }
window.approve=approve; window.reject=reject;

async function loadUsers(){
  const { users } = await adminGet('/api/admin/users');
  document.getElementById('panel-users').innerHTML = `<div class="card"><div class="table-scroll"><table class="data">
    <thead><tr><th>Name</th><th>Email</th><th>Nationality</th><th>Grade</th><th>Tier</th><th>Subscription</th><th>Devices</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${users.length? users.map(u=>`<tr>
      <td><a href="#" onclick="userDetail('${u.id}');return false" style="color:var(--accent);font-weight:700;text-decoration:none" title="Full plan history">${esc(u.name||'—')}</a></td><td>${esc(u.email)}</td><td>${u.nationality||'—'}</td><td>${u.grade||'—'}</td>
      <td style="text-transform:capitalize">${u.tier}</td>
      <td><span class="pill pill-${u.subState==='active'?'active':(u.subState==='suspended'?'suspended':'none')}">${u.subState}</span>${u.planId?'<div style="font-size:.72rem;color:var(--muted)">'+u.planId+'</div>':''}</td>
      <td>${u.deviceCount}/${u.maxDevices}${u.maxDevices!==3?' <span style="font-size:.68rem;color:var(--gold)">raised</span>':''}</td>
      <td><span class="pill pill-${u.status==='active'?'active':'banned'}">${u.status}</span></td>
      <td><div class="row-actions">
        <button class="btn btn-outline" onclick="manageSub('${u.id}','${u.planId||''}','${u.subState}')">Manage plan</button>
        <button class="btn btn-ghost" onclick="setDeviceLimit('${u.id}',${u.maxDevices})" title="Allow this account to use more (or fewer) devices">Devices: ${u.maxDevices}</button>
        ${u.subState==='active'?`<button class="btn btn-ghost" onclick="userAction('${u.id}','suspend')">Suspend</button>`:`<button class="btn btn-ghost" onclick="userAction('${u.id}','reactivate')">Reactivate</button>`}
        ${u.status==='banned'?`<button class="btn btn-primary" onclick="userAction('${u.id}','unban')">Unban</button>`:`<button class="btn btn-danger" onclick="userAction('${u.id}','ban')">Ban</button>`}
      </div></td>
    </tr>`).join('') : '<tr><td colspan="9" class="empty">No users yet.</td></tr>'}</tbody></table></div></div>`;
}
async function userAction(id, action){
  if(action==='ban' && !confirm('Ban this user? They will be logged out and unable to sign in.')) return;
  await adminPost(`/api/admin/users/${id}/action`, { action }); loadAll();
}
window.userAction=userAction;

// Per-account device cap. 2 is the site default; raising it is the durable way
// to permit a third (or fourth…) device for one trusted user.
async function setDeviceLimit(id, current){
  const v = prompt('How many devices may this account use? (site default is 3)', String(current||3));
  if(v===null) return;
  const n = Number(v);
  if(!Number.isInteger(n) || n<1 || n>10){ alert('Enter a whole number between 1 and 10.'); return; }
  await adminPost(`/api/admin/users/${id}/device-limit`, { maxDevices: n }); loadAll();
}
window.setDeviceLimit=setDeviceLimit;

// Full per-user drill-down: identity, the CURRENT plan with its exact dates
// and duration in months, and every payment ever submitted.
async function userDetail(id){
  const d = await adminGet(`/api/admin/users/${id}/detail`);
  const u = d.user;
  const PLAN_NAMES2 = {
    'student-monthly':'Student · Monthly','student-6m':'Student · 6-month','student-12m':'Student · 12-month',
    'professional-monthly':'Professional · Monthly','professional-6m':'Professional · 6-month','professional-yearly':'Professional · Yearly',
    'lifetime':'Lifetime','basic-monthly':'Basic · Monthly','advanced-monthly':'Advanced · Monthly',
  };
  const months = (a,b)=>{
    if(!a) return '';
    const start=new Date(a), end=b?new Date(b):null;
    if(!end) return 'no expiry (ongoing)';
    const m=(end-start)/(1000*60*60*24*30.44);
    return (Math.round(m*10)/10)+' month'+(m>=1.95?'s':'')+' — from '+fmtD(a)+' to '+fmtD(b);
  };
  const row=(k,v)=>`<div style="display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:.9rem"><span style="color:var(--muted);flex:none">${k}</span><span style="color:var(--text);font-weight:600;text-align:right">${v}</span></div>`;
  const proofRows = d.proofs.length ? d.proofs.map(p=>`<tr>
      <td>${fmtD(p.submittedAt)}</td>
      <td>${esc(PLAN_NAMES2[p.planId]||p.planId)}</td>
      <td><span class="method-badge ${esc(p.method)}">${esc(p.method)}</span></td>
      <td style="font-family:monospace;font-size:.78rem;word-break:break-all">${esc(p.transactionId||'—')}</td>

// Admin unblock: mark a stuck student's email verified so they can sign in now.
// (Firebase can't be made to re-send the mail from the server; verifying
// directly is the reliable stopgap until a custom SMTP sender is configured.)
async function verifyEmail(id){
  if(!confirm('Mark this student\'s email as verified so they can sign in immediately?\n\nUse this only for students you trust — it confirms the address on their behalf, without them clicking an email link.')) return;
  try{
    const r = await adminPost(`/api/admin/users/${id}/verify-email`, {});
    if(r && r.ok){
      if(r.link){
        window.prompt('Verified — this student can sign in now.\n\nOptional: you can also send them this personal verification link (e.g. on WhatsApp) so they confirm it themselves. Copy it below:', r.link);
      } else {
        alert('Verified — this student can sign in now.');
      }
      const m=document.getElementById('user-detail-modal'); if(m) m.remove();
      userDetail(id);   // reopen with refreshed status
    }
  }catch(e){ alert('Could not verify this account right now. Please try again.'); }
}
window.verifyEmail=verifyEmail;

async function loadDevices(){
  const [{ devices }, { appeals }] = await Promise.all([
    adminGet('/api/admin/devices'),
    adminGet('/api/admin/device-appeals'),
  ]);

  // ---- Appeals from users blocked by the device limit ----
  // Each pending appeal offers the three sensible outcomes: permit exactly the
  // device they appealed from, raise their whole account's cap, or dismiss.
  const pendingAppeals = appeals.filter(a => a.status === 'pending');
  const pastAppeals = appeals.filter(a => a.status !== 'pending').slice(0, 10);
  const appealCard = (a) => `
    <div class="card" style="margin-bottom:12px;border-left:3px solid ${a.status==='pending'?'var(--gold)':'var(--border)'}">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline">
        <div style="color:var(--text);font-weight:700">${esc(a.name||'')} <span style="color:var(--muted);font-weight:500">${esc(a.email)}</span></div>
        <div style="color:var(--muted);font-size:.78rem">${fmt(a.submittedAt)}${a.status!=='pending'?' · <span style="text-transform:capitalize">'+esc(a.status)+(a.resolution?' ('+esc(a.resolution)+')':'')+'</span>':''}</div>
      </div>
      <div style="color:var(--text-dim);margin:10px 0;white-space:pre-wrap">${esc(a.message)}</div>
      <div style="color:var(--muted);font-size:.74rem;font-family:monospace">device ${esc((a.deviceId||'(none)').slice(0,20))}${a.deviceId&&a.deviceId.length>20?'…':''} · ${esc((a.userAgent||'').slice(0,80))}</div>
      ${a.status==='pending'?`<div class="row-actions" style="margin-top:12px">
        <button class="btn btn-primary" onclick="resolveAppeal('${esc(a.id)}','permit-device')" title="Unblock exactly the device this appeal was sent from">Permit this device</button>
        <button class="btn btn-outline" onclick="resolveAppealRaise('${esc(a.id)}')" title="Let the whole account use more devices from now on">Raise device limit…</button>
        <button class="btn btn-ghost" onclick="resolveAppeal('${esc(a.id)}','dismiss')">Dismiss</button>
      </div>`:''}
    </div>`;
  const appealsHtml = `<div class="card" style="margin-bottom:16px">
    <h3 class="sec">Device-limit appeals ${pendingAppeals.length?`<span class="pill pill-pending" style="margin-left:8px">${pendingAppeals.length} pending</span>`:''}</h3>
    <p style="color:var(--muted);font-size:.85rem;margin-top:-6px">When a login is refused by the device limit, the user can explain their situation from the login page — it lands here for you to verify.</p>
    ${pendingAppeals.length? pendingAppeals.map(appealCard).join('') : '<div class="empty" style="padding:14px">No appeals waiting.</div>'}
    ${pastAppeals.length? '<h3 class="sec" style="margin-top:18px;font-size:.95rem">Recently resolved</h3>'+pastAppeals.map(appealCard).join('') : ''}
  </div>`;
  const row = d => {
    const uid = esc(d.userId), did = esc(d.deviceId);
    const state = d.flagged ? '<span class="pill pill-suspended">flagged</span>'
                : d.blocked ? '<span class="pill pill-rejected">blocked</span>'
                            : '<span class="pill pill-active">ok</span>';
    // Blocked or flagged? Offer "Permit". Neither? Offer "Flag". Both actions
    // are always safe to try again if the admin changes their mind.
    const canPermit = d.blocked || d.flagged;
    const actions = [];
    if (canPermit) actions.push(`<button class="btn btn-primary" style="padding:8px 13px;font-size:.83rem" onclick="permitDevice('${uid}','${did}')" title="Allow this device (clears block + flag)">Permit</button>`);
    if (!d.flagged) actions.push(`<button class="btn btn-danger" style="padding:8px 13px;font-size:.83rem" onclick="flagDevice('${uid}','${did}')">Flag</button>`);
    return `<tr>
      <td style="color:var(--text)">${d.userName?esc(d.userName)+'<br>':''}<span style="color:var(--muted);font-size:.8rem">${esc(d.userEmail)}</span></td>
      <td style="font-family:monospace;font-size:.78rem">${esc((d.deviceId||'').slice(0,16))}…</td>
      <td>${fmtD(d.firstSeen)}</td><td>${fmtD(d.lastSeen)}</td><td>${d.count||1}</td>
      <td>${state}${d.flagReason?'<div style="font-size:.72rem;color:var(--muted)">'+esc(d.flagReason)+'</div>':''}${d.permittedAt?'<div style="font-size:.72rem;color:var(--ok)">permitted '+fmtD(d.permittedAt)+'</div>':''}</td>
      <td><div style="display:flex;gap:6px;flex-wrap:wrap">${actions.join('') || '—'}</div></td>
    </tr>`;
  };
  document.getElementById('panel-devices').innerHTML = appealsHtml + `<div class="card"><h3 class="sec">Device history &amp; violations</h3><div class="table-scroll"><table class="data">
    <thead><tr><th>User</th><th>Device</th><th>First seen</th><th>Last seen</th><th>Uses</th><th>State</th><th>Action</th></tr></thead>
    <tbody>${devices.length? devices.map(row).join('') : '<tr><td colspan="7" class="empty">No device activity yet.</td></tr>'}</tbody></table></div>
    <p style="color:var(--muted);font-size:.82rem;margin-top:14px">
      <b>Flag</b> a device to mark a violation; use the Users tab afterwards to suspend or ban.
      <b>Permit</b> clears both the block and any flag — use this to grant a legitimate third device (a user with a new phone whose old two are still on file).
    </p></div>`;
}

async function saveDevPlan(planId){
  const priceEl = document.getElementById('dev-price-'+planId);
  const monthsEl = document.getElementById('dev-days-'+planId);
  const labelEl = document.getElementById('dev-label-'+planId);
  const price = priceEl.value;
  const months = monthsEl.value;
  const body = { label: labelEl.value };
  if (price !== '') body.priceNow = price;
  if (months !== '') body.days = Math.round(Number(months) * 30);
  try {
    await adminPost(`/api/admin/plan-config/${planId}`, body);
    document.getElementById('dev-save-status').innerHTML = `<div class="alert alert-success" style="margin-top:14px">Updated ${planId} — now live on the pricing page.</div>`;
    loadDev();
  } catch (e) {
    document.getElementById('dev-save-status').innerHTML = `<div class="alert alert-error" style="margin-top:14px">${e.message}</div>`;
  }
}
window.saveDevPlan = saveDevPlan;

/* ---- Accounts: every approved payment + earnings analysis ---- */
let ACCT_CURRENCY = 'usd'; // usd | inr | egp — the admin can switch how amounts are shown
let ACCT_DATA = null;

function money(rec, cur) {
  if (cur === 'inr') return '₹' + (rec.inr || 0).toLocaleString('en-IN');
  if (cur === 'egp') return 'E£' + (rec.egp || 0).toLocaleString();
  return '$' + (rec.usd || 0).toLocaleString();
}
function setAcctCurrency(cur) { ACCT_CURRENCY = cur; renderAccounts(); }
window.setAcctCurrency = setAcctCurrency;

async function loadAccounts() {
  ACCT_DATA = await adminGet('/api/admin/accounts');
  renderAccounts();
}

function bars(series, cur) {
  const max = Math.max(1, ...series.map(s => s.usd));
  return `<div class="bar-row">${series.map(s => {
    const pct = Math.round((s.usd / max) * 100);
    const amt = cur === 'inr' ? '₹' + Math.round(s.usd * 95.5).toLocaleString('en-IN')
              : cur === 'egp' ? 'E£' + Math.round(s.usd * 49.6).toLocaleString()
              : '$' + s.usd.toLocaleString();
    return `<div class="bar-col" title="${s.count} payment${s.count===1?'':'s'} · ${amt}">
      <div class="bar-track"><div class="bar-fill" style="height:${Math.max(pct,2)}%"></div></div>
      <div class="bar-amt">${s.usd ? amt : '—'}</div>
      <div class="bar-lbl">${s.label}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderAccounts() {
  if (!ACCT_DATA) return;
  const d = ACCT_DATA, cur = ACCT_CURRENCY;
  const s = d.summary;

  const totalShown = cur === 'inr' ? '₹' + s.totalInr.toLocaleString('en-IN')
                   : cur === 'egp' ? 'E£' + s.totalEgp.toLocaleString()
                   : '$' + s.totalUsd.toLocaleString();
  const conv = (usd) => cur === 'inr' ? '₹' + Math.round(usd * 95.5).toLocaleString('en-IN')
                      : cur === 'egp' ? 'E£' + Math.round(usd * 49.6).toLocaleString()
                      : '$' + usd.toLocaleString();

  const methodRows = Object.entries(d.byMethod).sort((a,b)=>b[1]-a[1])
    .map(([m, usd]) => `<div class="split-row"><span class="method-badge ${m}">${m}</span><b>${conv(usd)}</b></div>`).join('')
    || '<div class="empty">No payments yet.</div>';

  const planRows = Object.entries(d.byPlan).sort((a,b)=>b[1]-a[1])
    .map(([p, usd]) => `<div class="split-row"><span>${p}</span><b>${conv(usd)}</b></div>`).join('')
    || '<div class="empty">No payments yet.</div>';

  document.getElementById('panel-accounts').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px">
      <h3 class="sec" style="margin:0">Accounts &amp; earnings</h3>
      <div class="cur-switch">
        ${['usd','inr','egp'].map(c => `<button class="${cur===c?'on':''}" onclick="setAcctCurrency('${c}')">${c.toUpperCase()}</button>`).join('')}
      </div>
    </div>

    <div class="stat-grid">
      <div class="card stat-card accent"><div class="n">${totalShown}</div><div class="l">Total earned (all time)</div></div>
      <div class="card stat-card accent"><div class="n">${conv(s.last7Usd)}</div><div class="l">Last 7 days · ${s.last7Count} payment${s.last7Count===1?'':'s'}</div></div>
      <div class="card stat-card"><div class="n">${conv(s.last30Usd)}</div><div class="l">Last 30 days · ${s.last30Count} payment${s.last30Count===1?'':'s'}</div></div>
      <div class="card stat-card"><div class="n">${conv(s.avgUsd)}</div><div class="l">Average payment · ${s.totalPayments} total</div></div>
    </div>

    <div class="chart-grid">
      <div class="card">
        <h3 class="sec">Weekly earnings <span style="color:var(--muted);font-weight:500">(last 8 weeks)</span></h3>
        ${bars(d.weekly, cur)}
      </div>
      <div class="card">
        <h3 class="sec">Monthly earnings <span style="color:var(--muted);font-weight:500">(last 6 months)</span></h3>
        ${bars(d.monthly, cur)}
      </div>
    </div>

    <div class="chart-grid">
      <div class="card"><h3 class="sec">By payment method</h3>${methodRows}</div>
      <div class="card"><h3 class="sec">By plan</h3>${planRows}</div>
    </div>

    <div class="card" style="margin-top:16px">
      <h3 class="sec">Payment ledger <span style="color:var(--muted);font-weight:500">(${d.records.length} approved)</span></h3>
      <div class="table-scroll"><table class="data">
        <thead><tr><th>Date</th><th>User</th><th>Plan</th><th>Method</th><th>Amount</th><th>Transaction ID</th></tr></thead>
        <tbody>${d.records.length ? d.records.map(r => `<tr>
          <td>${fmtD(r.paidAt)}</td>
          <td style="color:var(--text)">${esc(r.userName || '')}<div style="color:var(--muted);font-size:.8rem">${esc(r.userEmail)}</div></td>
          <td>${esc(r.planName)}</td>
          <td><span class="method-badge ${esc(r.method)}">${esc(r.method)}</span></td>
          <td style="color:var(--text);font-weight:700">${money(r, cur)}</td>
          <td style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.82rem;word-break:break-all;user-select:all">${r.transactionId ? esc(r.transactionId) : '—'}</td>
        </tr>`).join('') : '<tr><td colspan="6" class="empty">No approved payments yet.</td></tr>'}</tbody>
      </table></div>
    </div>`;
}
</script>
</body>
</html>
